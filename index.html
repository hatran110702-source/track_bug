<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MKT Software · Bug Tracker</title>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  :root{--blue:#0063B8;--blue-l:#008DD4;--blue-d:#00427e;--orange:#F99D1F;--yellow:#F9C047;--danger:#E2231A;--green:#1aa64b;--ink:#1b2430;--muted:#7a8699;--line:#eaeef4;--bg:#eef2f7;--card:#fff;--sidebar1:#0b2a4a;--sidebar2:#0a2540;}
  *{box-sizing:border-box;} html,body{margin:0;height:100%;}
  body{font-family:'Segoe UI',system-ui,Arial,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;}
  button{cursor:pointer;border:none;border-radius:9px;font-weight:600;font-family:inherit;transition:.15s;}
  a{color:var(--blue);text-decoration:none;} a:hover{text-decoration:underline;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
  .shell{display:flex;height:100vh;}
  .side{width:236px;background:linear-gradient(180deg,var(--sidebar1),var(--sidebar2));color:#fff;display:flex;flex-direction:column;flex-shrink:0;}
  .side .brand{display:flex;align-items:center;justify-content:center;padding:16px;background:#fff;}
  .side .brand img{height:36px;max-width:196px;} .side .brand .badge{background:var(--blue);color:#fff;font-weight:900;padding:7px 11px;border-radius:9px;}
  .side nav{padding:14px 12px;flex:1;}
  .side nav .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#6f86a3;margin:12px 10px 6px;}
  .side nav button{width:100%;display:flex;align-items:center;gap:12px;background:none;color:#c3d3e6;padding:11px 13px;border-radius:10px;font-size:14px;text-align:left;margin-bottom:4px;border-left:3px solid transparent;}
  .side nav button:hover{background:rgba(255,255,255,.07);color:#fff;}
  .side nav button.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:var(--orange);font-weight:700;}
  .side nav .ic{width:18px;height:18px;flex-shrink:0;opacity:.9;}
  .side .foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:#7f93a8;}
  .main{flex:1;overflow:auto;display:flex;flex-direction:column;}
  .top{background:#fff;border-bottom:1px solid var(--line);padding:15px 26px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:6;}
  .top h1{font-size:19px;margin:0;font-weight:800;letter-spacing:-.2px;}
  .top .sub{font-size:12px;color:var(--muted);margin-top:1px;}
  .top .meta{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--muted);}
  .live{display:flex;align-items:center;gap:7px;background:#eafaf1;color:#137a3a;padding:5px 11px;border-radius:20px;font-weight:600;}
  .live .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(26,166,75,.5);}70%{box-shadow:0 0 0 6px rgba(26,166,75,0);}100%{box-shadow:0 0 0 0 rgba(26,166,75,0);}}
  .rf{background:var(--blue);color:#fff;padding:8px 14px;font-size:13px;} .rf:hover{background:var(--blue-d);}
  .content{padding:22px 26px;}
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;gap:13px;align-items:center;box-shadow:0 1px 2px rgba(16,24,40,.04);}
  .kpi .ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .kpi .l{font-size:11px;color:var(--muted);font-weight:600;} .kpi .n{font-size:25px;font-weight:800;line-height:1.1;margin-top:2px;}
  .i-blue{background:#e6f0fb;color:var(--blue);} .i-orange{background:#fff2df;color:#c9760a;} .i-red{background:#fdeceb;color:var(--danger);} .i-green{background:#e7f8ee;color:var(--green);} .i-gray{background:#eef2f7;color:#5b6b80;}
  .grid2{display:grid;grid-template-columns:1.1fr 1fr;gap:18px;margin-bottom:22px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(16,24,40,.04);margin-bottom:22px;overflow:hidden;}
  .panel h3{font-size:14px;margin:0;padding:15px 18px;border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .panel .pb{padding:18px;}
  .donut{width:150px;height:150px;border-radius:50%;flex-shrink:0;position:relative;}
  .donut::after{content:"";position:absolute;inset:31px;background:#fff;border-radius:50%;box-shadow:inset 0 0 0 1px var(--line);}
  .donut .cx{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;} .donut .cx b{font-size:22px;} .donut .cx span{font-size:10px;color:var(--muted);}
  .leg{font-size:12.5px;flex:1;} .leg div{display:flex;align-items:center;gap:8px;margin-bottom:7px;} .leg .sw{width:11px;height:11px;border-radius:3px;} .leg .vv{margin-left:auto;font-weight:700;color:var(--muted);}
  .rb{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12.5px;} .rb .nm{width:150px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#2a3646;} .rb .tk{flex:1;height:16px;border-radius:5px;background:#eef2f7;overflow:hidden;} .rb .tk>i{display:block;height:100%;background:linear-gradient(90deg,var(--blue-l),var(--blue));border-radius:5px;} .rb .vn{width:30px;text-align:right;font-weight:700;color:var(--muted);}
  .buckets{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  .bucket{border-radius:14px;padding:16px;color:#fff;} .bucket .n{font-size:30px;font-weight:800;} .bucket .l{font-size:12px;opacity:.95;font-weight:600;} .bucket .s{font-size:11px;opacity:.8;margin-top:3px;}
  .bk0{background:linear-gradient(135deg,#1aa64b,#12833b);} .bk1{background:linear-gradient(135deg,#F9C047,#e6a012);} .bk2{background:linear-gradient(135deg,#F99D1F,#e07d00);} .bk3{background:linear-gradient(135deg,#E2231A,#b3140d);}
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
  .filters select,.filters input{padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:#fff;}
  .filters input[type=text]{min-width:230px;}
  .chk{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);padding:8px 11px;border-radius:9px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:11px 16px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle;}
  th{background:#f7f9fc;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:700;cursor:pointer;user-select:none;}
  td.c,th.c{text-align:center;white-space:nowrap;}
  tbody tr:hover td{background:#f6faff;}
  tr.aged td{background:#fef4f3;} tr.aged:hover td{background:#fdeceb;}
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
  .type{font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;}
  .ty-bug{background:#fdeceb;color:#b3140d;} .ty-proposal{background:#e6f0fb;color:var(--blue);} .ty-improvement{background:#fff7e0;color:#8a5a00;}
  .age{font-weight:800;} .age.hot{color:var(--danger);} .age.warn{color:#c9760a;}
  .empty{padding:28px;text-align:center;color:var(--muted);} .loading{padding:70px;text-align:center;color:var(--muted);}
  .fld{margin-bottom:16px;max-width:560px;} .fld label{display:block;font-size:12.5px;color:var(--ink);font-weight:700;margin-bottom:6px;} .fld .hint{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5;}
  .hint{font-size:12px;color:var(--muted);line-height:1.5;}
  .fld input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;}
  .btn-pri{background:var(--blue);color:#fff;padding:11px 20px;font-size:14px;} .btn-pri:hover{background:var(--blue-d);}
  .btn-gh{background:#fff;color:var(--blue);border:1px solid var(--blue);padding:11px 18px;font-size:14px;} .btn-gh:hover{background:#f0f6fd;}
  .btn-green{background:var(--green);color:#fff;padding:11px 20px;font-size:14px;} .btn-green:hover{background:#158a3f;}
  .row-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .msg{font-size:13px;font-weight:600;margin-top:12px;min-height:18px;} .msg.ok{color:var(--green);} .msg.er{color:var(--danger);}
  .switch{position:relative;display:inline-block;width:40px;height:22px;} .switch input{display:none;} .slider{position:absolute;inset:0;background:#cdd7e3;border-radius:22px;transition:.2s;} .slider::before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;} .switch input:checked+.slider{background:var(--green);} .switch input:checked+.slider::before{transform:translateX(18px);}
  .step{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;gap:14px;margin-bottom:10px;max-width:820px;box-shadow:0 1px 2px rgba(16,24,40,.04);}
  .step .no{width:34px;height:34px;border-radius:50%;background:var(--blue);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .step .st{font-weight:800;font-size:15px;margin-bottom:5px;} .step .sb{font-size:13.5px;color:#33414f;line-height:1.7;}
  .note{background:#fff8e8;border:1px solid #f6e2ad;border-radius:12px;padding:12px 14px;font-size:13px;color:#7a5a00;max-width:820px;margin-bottom:14px;}
  code{background:#eef2f7;padding:1px 6px;border-radius:5px;font-size:12px;}
  textarea{width:100%;min-height:100px;padding:10px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-family:monospace;}
  details summary{outline:none;}
  @media(max-width:960px){.kpis{grid-template-columns:repeat(2,1fr);}.grid2{grid-template-columns:1fr;}.buckets{grid-template-columns:repeat(2,1fr);}.side{width:60px;}.side .brand img{max-width:40px;}.side nav .txt,.side nav .lbl,.side .foot{display:none;}.hide{display:none;}}
</style>
</head>
<body>
<h2 class="sr-only">MKT Software Bug Tracker – theo dõi bug realtime từ hệ thống Vitech và nhắc Telegram trực tiếp từ web.</h2>
<div class="shell">
  <aside class="side">
    <div class="brand"><img src="mkt-logo.png" alt="MKT Software" onerror="this.outerHTML='<div class=\'badge\'>MKT</div>'"></div>
    <nav id="nav"></nav>
    <div class="foot">Nguồn: hệ thống Vitech<br>Tự cập nhật realtime<br><b style="color:#9fd3ff">Phiên bản 2.3</b></div>
  </aside>
  <div class="main">
    <div class="top">
      <div><h1 id="page-title">Tổng quan</h1><div class="sub" id="page-sub">Bức tranh toàn bộ bug &amp; đề xuất</div></div>
      <div class="meta"><span class="live"><span class="dot"></span> Live · <span id="updated">…</span></span><button class="rf" onclick="loadData()">↻ Làm mới</button></div>
    </div>
    <div class="content" id="content"><div class="loading">Đang tải dữ liệu từ Vitech…</div></div>
  </div>
</div>

<script>
/* ============ NGUỒN DỮ LIỆU ============ */
var API='https://api-dev.vitechgroup.vn/api/v1/public/report/vitech-software-report/tickets';
var TRACK='https://dev.vitechgroup.vn/report/vitech-software-report/track/';
var POLL_MS=300000;

/* ============ CẤU HÌNH TELEGRAM (lưu trên trình duyệt) ============ */
var CFG={token:'',manager:'',aging:7,auto:false,hour:8,map:{}};
try{var _s=JSON.parse(localStorage.getItem('mkt_tg')||'null'); if(_s) CFG=Object.assign(CFG,_s);}catch(_e){}
var AGING_DAYS=CFG.aging||7;
function saveCfg(){try{localStorage.setItem('mkt_tg',JSON.stringify(CFG));}catch(e){}}

var STATUS={pending:{l:'Đang chờ',c:'#F99D1F'},reviewing:{l:'Đã tiếp nhận',c:'#008DD4'},in_progress:{l:'Đang xử lý',c:'#0063B8'},resolved:{l:'Đã hoàn thành',c:'#1aa64b'},rejected:{l:'Từ chối',c:'#9aa5b1'},duplicate:{l:'Trùng lặp',c:'#6b7280'}};
var OPEN_STATUS=['pending','reviewing','in_progress'];
var TYPE={bug:{l:'Bug',c:'ty-bug'},proposal:{l:'Đề xuất',c:'ty-proposal'},improvement:{l:'Cải tiến',c:'ty-improvement'}};
var ICONS={
  bug:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="6" width="8" height="14" rx="4"/><path d="M12 6V3M5 9l3 1M19 9l-3 1M4 15h4M16 15h4"/></svg>',
  clock:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  alert:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17h.01"/></svg>',
  check:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>',
  list:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>',
  book:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2z"/><path d="M4 19V5"/></svg>',
  send:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>'
};
var NAV=[['overview','Tổng quan','Bức tranh toàn bộ bug & đề xuất',ICONS.list],
  ['aging','Bug tồn đọng','Bug chưa xử lý xong, phân theo số ngày tồn',ICONS.clock],
  ['all','Tất cả ticket','Danh sách đầy đủ, lọc & tìm kiếm',ICONS.bug],
  ['guide','Hướng dẫn dùng bot','Cài đặt & sử dụng — ngay trên web',ICONS.book],
  ['settings','Nhắc Telegram','Nhập token + gán ID nhân sự, gửi nhắc',ICONS.send]];

var ALL=[], VIEW='overview', FILT={type:'',status:'',product:'',reporter:'',q:'',openOnly:false}, SORT={key:'createdAt',dir:-1}, POLL=null, FOUND=[];

function e(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function daysSince(iso){return iso?Math.floor((Date.now()-new Date(iso).getTime())/86400000):0;}
function fmtDate(iso){if(!iso)return'';var d=new Date(iso),p=function(n){return n<10?'0'+n:n;};return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear();}
function isOpen(t){return OPEN_STATUS.indexOf(t.status)!==-1;}
function stL(s){return (STATUS[s]||{l:s}).l;} function stC(s){return (STATUS[s]||{c:'#6b7280'}).c;}

function buildNav(){ document.getElementById('nav').innerHTML=
  '<div class="lbl">Theo dõi</div>'+NAV.slice(0,3).map(navBtn).join('')+
  '<div class="lbl">Nhắc & hướng dẫn</div>'+NAV.slice(3).map(navBtn).join(''); }
function navBtn(it){return '<button data-v="'+it[0]+'" onclick="go(\''+it[0]+'\')"><span class="ic">'+it[3]+'</span><span class="txt">'+it[1]+'</span></button>';}
function go(v){ VIEW=v;
  document.querySelectorAll('#nav button').forEach(function(b){b.classList.toggle('active',b.dataset.v===v);});
  var it=NAV.filter(function(x){return x[0]===v;})[0];
  document.getElementById('page-title').textContent=it[1]; document.getElementById('page-sub').textContent=it[2];
  render();
}
async function loadData(){
  document.getElementById('updated').textContent='đang tải…';
  try{
    var all=[],page=1,tp=1;
    do{ var r=await fetch(API+'?page='+page+'&limit=100').then(function(x){return x.json();});
      all=all.concat(r.data||[]); tp=(r.meta&&r.meta.totalPages)||1; page++;
    }while(page<=tp && page<=30);
    ALL=all.map(function(t){var open=isOpen(t),age=daysSince(t.createdAt);
      return {code:t.code,title:t.title||'',type:t.type||'',status:t.status||'',product:t.productName||'(không rõ)',reporter:t.reporterName||'(ẩn)',createdAt:t.createdAt,open:open,age:age,aged:open&&age>AGING_DAYS};});
    var n=new Date(); document.getElementById('updated').textContent=('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2)+' '+fmtDate(n.toISOString());
    render(); maybeAutoSend();
  }catch(err){ document.getElementById('content').innerHTML='<div class="empty">Lỗi tải dữ liệu Vitech: '+e(err.message)+'</div>'; }
}
function render(){ ({overview:vOverview,aging:vAging,all:vAll,guide:vGuide,settings:vSettings}[VIEW]||vOverview)(); }
function distinct(k){return Array.from(new Set(ALL.map(function(t){return t[k];}))).filter(Boolean).sort();}
function optList(arr,val){return arr.map(function(o){return '<option'+(o===val?' selected':'')+'>'+e(o)+'</option>';}).join('');}
function pill(s){return '<span class="pill" style="background:'+stC(s)+'1e;color:'+stC(s)+'">'+stL(s)+'</span>';}

/* ===== TỔNG QUAN ===== */
function vOverview(){
  var open=ALL.filter(function(t){return t.open;});
  var k={total:ALL.length,pending:ALL.filter(function(t){return t.status==='pending';}).length,
    inprog:ALL.filter(function(t){return t.status==='in_progress'||t.status==='reviewing';}).length,
    open:open.length,done:ALL.filter(function(t){return t.status==='resolved';}).length};
  var order=['pending','reviewing','in_progress','resolved','rejected','duplicate'];
  var byS={}; order.forEach(function(s){byS[s]=ALL.filter(function(t){return t.status===s;}).length;});
  var t5=ALL.length||1,acc=0;
  var stops=order.map(function(s){var f=acc/t5*100;acc+=byS[s];return stC(s)+' '+f+'% '+(acc/t5*100)+'%';}).join(',');
  var prodOpen={}; open.forEach(function(t){prodOpen[t.product]=(prodOpen[t.product]||0)+1;});
  var top=Object.keys(prodOpen).map(function(p){return[p,prodOpen[p]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var mx=top.length?top[0][1]:1;
  var html='<div class="kpis">'+kpi('list','Tổng ticket',k.total,'blue')+kpi('clock','Đang chờ',k.pending,'orange')+kpi('bug','Đang xử lý',k.inprog,'blue')+kpi('alert','Còn tồn',k.open,'red')+kpi('check','Hoàn thành',k.done,'green')+'</div>';
  html+='<div class="grid2">'+
    '<div class="panel"><h3>Phân bố trạng thái</h3><div class="pb" style="display:flex;gap:22px;align-items:center">'+
      '<div class="donut" style="background:conic-gradient('+stops+')"><div class="cx"><b>'+k.open+'</b><span>còn tồn</span></div></div>'+
      '<div class="leg">'+order.map(function(s){return '<div><span class="sw" style="background:'+stC(s)+'"></span>'+stL(s)+'<span class="vv">'+byS[s]+'</span></div>';}).join('')+'</div>'+
    '</div></div>'+
    '<div class="panel"><h3>Top sản phẩm còn tồn bug</h3><div class="pb">'+
      (top.length?top.map(function(p){return '<div class="rb"><div class="nm">'+e(p[0])+'</div><div class="tk"><i style="width:'+(p[1]/mx*100)+'%"></i></div><div class="vn">'+p[1]+'</div></div>';}).join(''):'<div class="empty">Không có</div>')+
    '</div></div></div>';
  var aged=open.filter(function(t){return t.aged;}).sort(function(a,b){return b.age-a.age;});
  html+='<div class="panel"><h3>⚠️ Cần xử lý gấp — tồn quá '+AGING_DAYS+' ngày <span style="color:var(--danger);font-weight:800">'+aged.length+'</span></h3>'+
    (aged.length?('<table><thead><tr><th>Mã</th><th>Tiêu đề</th><th class="hide">Sản phẩm</th><th class="hide">Người báo</th><th class="c">Trạng thái</th><th class="c">Tồn</th></tr></thead><tbody>'+
      aged.slice(0,8).map(function(t){return '<tr class="aged"><td><a href="'+TRACK+e(t.code)+'" target="_blank"><b>'+e(t.code)+'</b></a></td><td>'+e(t.title)+'</td><td class="hide">'+e(t.product)+'</td><td class="hide">'+e(t.reporter)+'</td><td class="c">'+pill(t.status)+'</td><td class="c"><span class="age hot">'+t.age+'d</span></td></tr>';}).join('')+'</tbody></table>'):'<div class="empty">Không có bug tồn quá hạn 🎉</div>')+'</div>';
  document.getElementById('content').innerHTML=html;
}

function th(label,key,c){var a=SORT.key===key?(SORT.dir>0?' ▲':' ▼'):'';return '<th class="'+(c||'')+'" onclick="sortBy(\''+key+'\')">'+label+a+'</th>';}
function sortBy(k){if(SORT.key===k)SORT.dir=-SORT.dir;else{SORT.key=k;SORT.dir=1;}render();}
function filtered(){
  var rows=ALL.filter(function(t){
    if(FILT.type&&t.type!==FILT.type)return false;
    if(FILT.status&&t.status!==FILT.status)return false;
    if(FILT.product&&t.product!==FILT.product)return false;
    if(FILT.reporter&&t.reporter!==FILT.reporter)return false;
    if(FILT.openOnly&&!t.open)return false;
    if(FILT.q){var q=FILT.q.toLowerCase().trim();if((t.code+' '+t.title).toLowerCase().indexOf(q)===-1)return false;}
    return true;
  });
  var k=SORT.key,d=SORT.dir;
  rows.sort(function(a,b){var va=a[k],vb=b[k];if(k==='createdAt'){va=+new Date(a.createdAt);vb=+new Date(b.createdAt);}if(k==='age'){va=a.open?a.age:-1;vb=b.open?b.age:-1;}return va<vb?-1*d:(va>vb?d:0);});
  return rows;
}

/* ===== NHẮC TELEGRAM (web tự gửi, gán bằng chọn — không cần bảng dài) ===== */
function tgBase(){return 'https://api.telegram.org/bot'+CFG.token;}
function tgSend(chatId,text){
  return fetch(tgBase()+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:String(chatId),text:text,parse_mode:'HTML',disable_web_page_preview:true})}).then(function(r){return r.json();});
}
function todayShort(){var d=new Date();return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2);}
function shorten(s,n){s=String(s||'');n=n||55;return s.length>n?s.slice(0,n)+'…':s;}
function bugLine(t,i,showAge){return i+'. <b>'+t.code+'</b> · '+stL(t.status)+(showAge?' · <b>tồn '+t.age+' ngày</b>':'')+'\n    '+shorten(t.title,72)+'\n';}
function personalMsg(name,list){
  list.sort(function(a,b){return b.age-a.age;});
  var late=list.filter(function(t){return t.age>AGING_DAYS;});
  var rest=list.filter(function(t){return t.age<=AGING_DAYS;});
  var msg='🔔 <b>NHẮC BUG · '+todayShort()+'</b>\nChào <b>'+name+'</b> — đang có <b>'+list.length+'</b> ticket chưa xử lý xong.\n';
  if(late.length){msg+='\n🔴 <b>TỒN QUÁ '+AGING_DAYS+' NGÀY — CẦN GẤP ('+late.length+')</b>\n';var i=0;late.forEach(function(t){i++;msg+=bugLine(t,i,true);});}
  if(rest.length){msg+='\n🟠 <b>ĐANG MỞ ('+rest.length+')</b>\n';var j=0;rest.forEach(function(t){j++;msg+=bugLine(t,j,false);});}
  msg+='\n👉 Chi tiết trên hệ thống Vitech.';
  return msg;
}
function managerMsg(open,byR){
  var late=open.filter(function(t){return t.age>AGING_DAYS;}).length;
  var msg='📊 <b>BÁO CÁO BUG '+todayShort()+'</b>\nTổng '+ALL.length+' | Còn tồn '+open.length+' | Tồn quá '+AGING_DAYS+'d: <b>'+late+'</b>\n\n👤 <b>Top người báo còn tồn:</b>\n';
  Object.keys(byR).map(function(r){return[r,byR[r].length];}).sort(function(a,b){return b[1]-a[1];}).slice(0,10).forEach(function(r){msg+='• '+r[0]+': '+r[1]+'\n';});
  return msg;
}
async function sendAll(){
  if(!CFG.token) return {ok:false,msg:'Chưa nhập Bot Token.'};
  var open=ALL.filter(function(t){return t.open;});
  var byR={}; open.forEach(function(t){(byR[t.reporter]=byR[t.reporter]||[]).push(t);});
  var sent=0,fail=0;
  for(var name in CFG.map){ var m=CFG.map[name]; if(!m||!m.enabled||!m.chatId||!byR[name]) continue;
    try{ var r=await tgSend(m.chatId,personalMsg(name,byR[name])); if(r&&r.ok)sent++; else fail++; }catch(e){fail++;} }
  if(CFG.manager){ try{ await tgSend(CFG.manager,managerMsg(open,byR)); }catch(e){} }
  try{localStorage.setItem('mkt_last_send',new Date().toDateString());}catch(e){}
  return {ok:true,sent:sent,fail:fail};
}
function maybeAutoSend(){
  if(!CFG.auto||!CFG.token) return;
  var now=new Date();
  if(now.getHours() < (CFG.hour!=null?CFG.hour:8)) return;   // chưa tới giờ gửi
  var last=''; try{last=localStorage.getItem('mkt_last_send')||'';}catch(e){}
  if(last!==now.toDateString()) sendAll();
}

function checkToken(){var t=document.getElementById('s-token').value.trim(),m=document.getElementById('tok-msg');if(!t){m.className='msg er';m.textContent='Nhập token trước.';return;}CFG.token=t;m.className='msg';m.textContent='Đang kiểm tra…';
  fetch(tgBase()+'/getMe').then(function(r){return r.json();}).then(function(j){if(j.ok){m.className='msg ok';m.textContent='✅ OK — bot: @'+j.result.username;document.getElementById('tok-pill').innerHTML=okPill('đã có token');}else{m.className='msg er';m.textContent='❌ Token sai: '+(j.description||'');}}).catch(function(er){m.className='msg er';m.textContent='❌ '+er.message;});}
function fetchChatIds(){var t=document.getElementById('s-token').value.trim(),m=document.getElementById('tok-msg');if(!t){m.className='msg er';m.textContent='Nhập token trước.';return;}CFG.token=t;m.className='msg';m.textContent='Đang lấy danh sách…';
  fetch(tgBase()+'/getUpdates').then(function(r){return r.json();}).then(function(j){
    if(!j.ok){m.className='msg er';m.textContent='❌ '+(j.description||'lỗi');return;}
    var seen={};FOUND=[];(j.result||[]).forEach(function(u){var c=u.message?u.message.chat:(u.my_chat_member?u.my_chat_member.chat:null);if(c&&!seen[c.id]){seen[c.id]=1;FOUND.push(c);}});
    m.className='msg ok';m.textContent='✅ Tìm thấy '+FOUND.length+' người/nhóm đã nhắn bot. Chọn “người báo” tương ứng cho từng người.';
    document.getElementById('tok-pill').innerHTML=okPill('đã có token'); renderFound();
  }).catch(function(er){m.className='msg er';m.textContent='❌ '+er.message;});}
function renderFound(){
  var box=document.getElementById('found-box'); if(!box)return;
  if(!FOUND.length){box.innerHTML='';return;}
  box.innerHTML='<div style="margin-top:12px;border:1px solid var(--line);border-radius:9px;overflow:hidden"><table><thead><tr><th>Tên Telegram</th><th>chat_id</th><th style="min-width:230px">Gán cho người báo</th></tr></thead><tbody>'+
    FOUND.map(function(c,i){var assignedTo='';Object.keys(CFG.map).forEach(function(n){if(String(CFG.map[n].chatId)===String(c.id))assignedTo=n;});

      '<td><select onchange="assignChat('+i+',this.value)" style="width:230px;padding:8px;border:1px solid var(--line);border-radius:8px">'+reporterOptions(assignedTo)+'</select></td></tr>';}).join('')+

}
function assignChat(i,rep){var c=FOUND[i];if(!c)return;
  Object.keys(CFG.map).forEach(function(n){if(String(CFG.map[n].chatId)===String(c.id))delete CFG.map[n];});
  if(rep)CFG.map[rep]={chatId:String(c.id),enabled:true};
  renderAssigned(); renderFound();
}
function CFGset(name,field,val){if(!CFG.map[name])CFG.map[name]={chatId:'',enabled:false};CFG.map[name][field]=val;}

}
/* Import hàng loạt (tùy chọn, thu gọn) */
function importInner(){return '<div class="hint" style="margin-bottom:8px">Mỗi dòng: <b>Tên người báo , chat_id</b>. Tên phải khớp tên trên Vitech (vd <code>Thu H*</code>).</div>'+
  '<textarea id="imp-box" placeholder="Thu H* , 7822926378&#10;Tiến s****** , 8584274675"></textarea>'+
  '<div class="row-btns" style="margin-top:10px"><button class="btn-pri" onclick="applyImport()">Áp dụng</button><button class="btn-gh" onclick="fillTemplate()">Lấy mẫu tên</button>'+
  '<label class="btn-gh" style="margin:0;cursor:pointer">📄 Nhập CSV<input type="file" accept=".csv,.txt" style="display:none" onchange="importFile(event)"></label></div><div class="msg" id="imp-msg"></div>';}
function parseIdLines(text){var map={};(text||'').split(/\r?\n/).forEach(function(line){line=line.trim();if(!line)return;var parts=line.split(/[,;\t=]+/);if(parts.length<2)return;var id=parts[parts.length-1].trim();var name=parts.slice(0,parts.length-1).join(',').trim();if(name&&id&&!/^t[eê]n/i.test(name))map[name]=id;});return map;}
function applyImport(){var map=parseIdLines(document.getElementById('imp-box').value);var n=0;Object.keys(map).forEach(function(name){CFG.map[name]={chatId:map[name],enabled:true};n++;});renderAssigned();renderFound();var m=document.getElementById('imp-msg');m.className='msg '+(n?'ok':'er');m.textContent=n?('✓ Đã thêm/cập nhật '+n+' người. Nhớ bấm 💾 Lưu.'):'Không đọc được dòng nào.';}
function fillTemplate(){var reps=distinct('reporter');document.getElementById('imp-box').value=reps.map(function(r){return r+' , '+((CFG.map[r]||{}).chatId||'');}).join('\n');}
function importFile(ev){var f=ev.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){document.getElementById('imp-box').value=rd.result;};rd.readAsText(f);ev.target.value='';}

function doSave(){
  CFG.token=document.getElementById('s-token').value.trim();
  CFG.manager=document.getElementById('s-mgr').value.trim();
  CFG.aging=parseInt(document.getElementById('s-aging').value,10)||7; AGING_DAYS=CFG.aging;
  CFG.auto=document.getElementById('s-auto').checked;
  var hh=parseInt(document.getElementById('s-hour').value,10); CFG.hour=isNaN(hh)?8:hh;
  saveCfg();
  ALL.forEach(function(t){t.aged=t.open&&t.age>AGING_DAYS;});
  var m=document.getElementById('save-msg');m.className='msg ok';m.textContent='✓ Đã lưu trên trình duyệt này.';
}
function doSendNow(){
  doSave();
  var m=document.getElementById('save-msg');m.className='msg';m.textContent='Đang gửi…';
  sendAll().then(function(r){
    if(!r.ok){m.className='msg er';m.textContent=r.msg;return;}
    if(r.sent===0 && r.fail===0){m.className='msg er';m.textContent='⚠️ Không gửi cho ai. Kiểm tra: (1) đã GẠT công tắc “Bật” cho người đó chưa; (2) người đó có đang có bug mở không (cột “Đang mở” > 0). Muốn thử riêng đường kết nối, dùng “🧪 Gửi thử 1 tin” bên dưới.';return;}
    m.className='msg ok';m.textContent='✓ Đã gửi '+r.sent+' người'+(r.fail?(', lỗi '+r.fail):'')+(CFG.manager?' + báo cáo quản lý':'')+'.';
  });
}
function sendTestMsg(){
  var cid=document.getElementById('test-cid').value.trim(),m=document.getElementById('test-msg');
  if(!CFG.token) CFG.token=document.getElementById('s-token').value.trim();
  if(!CFG.token){m.className='msg er';m.textContent='Chưa có token (nhập ở mục ①).';return;}
  if(!cid){m.className='msg er';m.textContent='Dán chat_id cần thử.';return;}
  m.className='msg';m.textContent='Đang gửi…';
  tgSend(cid,'🔔 Tin thử từ MKT Bug Tracker — kết nối OK!').then(function(r){
    if(r&&r.ok){m.className='msg ok';m.textContent='✅ Gửi thành công! Mở Telegram kiểm tra.';}
    else{m.className='msg er';m.textContent='❌ Telegram báo: '+((r&&r.description)||'lỗi không rõ');}
  }).catch(function(er){m.className='msg er';m.textContent='❌ '+er.message;});
}
function genConfig(){
  doSave();
  var lines=[];
  Object.keys(CFG.map).forEach(function(n){var m=CFG.map[n];if(m&&m.enabled&&m.chatId)lines.push("  '"+String(n).replace(/'/g,"\\'")+"': '"+m.chatId+"'");});
  var out="var BOT_TOKEN = '"+CFG.token+"';\n"+
    "var MANAGER_CHAT_ID = '"+(CFG.manager||'')+"';\n"+
    "var AGING_DAYS = "+AGING_DAYS+";\n"+
    "var REPORTER_MAP = {\n"+lines.join(',\n')+"\n};";
  var ta=document.getElementById('cfg-out'); ta.style.display='block'; ta.value=out;
  ta.focus(); ta.select();
  var ok=false; try{ok=document.execCommand('copy');}catch(e){}
  var m=document.getElementById('cfg-msg'); m.className='msg '+(lines.length?'ok':'er');
  m.textContent=lines.length?((ok?'✓ Đã copy. ':'')+'Dán khối này thay phần CONFIG đầu file Telegram_Reminder.gs.'):'⚠️ Chưa có người nào Bật + có chat_id để xuất.';
}

buildNav();
loadData();
POLL=setInterval(loadData,POLL_MS);
</script>
